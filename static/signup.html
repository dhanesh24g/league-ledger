<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League Ledger Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <script>
    (function () {
      try {
        var key = "dhaneshlabs-theme";
        var stored = localStorage.getItem(key);
        var theme = (stored === "light" || stored === "dark")
          ? stored
          : (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <main class="shell-main">
    <section class="panel active auth-panel">
      <h2>Create Your Account</h2>
      <p class="muted">Join the league with your own identity. Your password is stored as a secure hash, not plain text.</p>
      <form id="signup-form" class="stack">
        <div class="grid auth-grid">
          <label>First Name
            <input name="first_name" placeholder="Dhanesh" required>
          </label>
          <label>Last Name
            <input name="last_name" placeholder="Patel" required>
          </label>
        </div>
        <label>User ID
          <input name="user_id" placeholder="dhanesh24g" required>
        </label>
        <label>Email
          <input type="email" name="email" placeholder="you@example.com" required>
        </label>
        <label>Password
          <input type="password" name="password" placeholder="At least 8 characters" required>
        </label>
        <button type="submit">Create Account</button>
      </form>
      <div class="auth-switch">
        <span class="muted small">Already have an account?</span>
        <a class="button-link ghost" href="/login">Back to Login</a>
      </div>
      <p id="signup-hint" class="muted small"></p>
    </section>
  </main>
  <script src="/static/signup.js"></script>
</body>

</html>
