<!doctype html>
<html lang="en">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZDJLNDFYR9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-ZDJLNDFYR9');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
  <button id="theme-toggle" class="theme-toggle theme-toggle-segmented" type="button" aria-label="Theme setting">
    <span class="theme-option" id="light-icon"><span class="theme-option-glyph">☀</span></span>
    <span class="theme-option" id="dark-icon"><span class="theme-option-glyph">☾</span></span>
  </button>

  <main class="shell-main auth-split-shell-wrap">
    <section class="panel active auth-split-shell auth-split-shell-login">
      <div class="auth-split-card auth-split-form-card">
        <div class="auth-split-header">
          <p class="auth-split-kicker">Secure reset</p>
          <h1>Set new password</h1>
          <p class="muted">Use a strong password. This reset link works only once and expires automatically.</p>
        </div>

        <form id="reset-password-form" class="stack auth-form auth-split-form">
          <label>New Password
            <div class="password-field">
              <input type="password" name="new_password" autocomplete="new-password" minlength="8" required>
              <button type="button" class="password-toggle" data-password-toggle aria-label="Show password">
                <svg class="password-toggle-icon password-toggle-icon-show" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12c2.2-4.2 5.6-6.3 10-6.3s7.8 2.1 10 6.3c-2.2 4.2-5.6 6.3-10 6.3S4.2 16.2 2 12Z" />
                  <circle cx="12" cy="12" r="3.2" />
                </svg>
                <svg class="password-toggle-icon password-toggle-icon-hide hidden" viewBox="0 0 24 24"
                  aria-hidden="true">
                  <path d="M3 3l18 18" />
                  <path d="M10.6 5.9A10.7 10.7 0 0 1 12 5.7c4.4 0 7.8 2.1 10 6.3a17 17 0 0 1-3.7 4.6" />
                  <path d="M6.5 6.5A17.1 17.1 0 0 0 2 12c2.2 4.2 5.6 6.3 10 6.3a10.8 10.8 0 0 0 5-1.2" />
                  <path d="M9.9 9.9a3.2 3.2 0 0 0 4.2 4.2" />
                </svg>
              </button>
            </div>
          </label>
          <label>Confirm New Password
            <div class="password-field">
              <input type="password" name="confirm_password" autocomplete="new-password" minlength="8" required>
              <button type="button" class="password-toggle" data-password-toggle aria-label="Show password">
                <svg class="password-toggle-icon password-toggle-icon-show" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12c2.2-4.2 5.6-6.3 10-6.3s7.8 2.1 10 6.3c-2.2 4.2-5.6 6.3-10 6.3S4.2 16.2 2 12Z" />
                  <circle cx="12" cy="12" r="3.2" />
                </svg>
                <svg class="password-toggle-icon password-toggle-icon-hide hidden" viewBox="0 0 24 24"
                  aria-hidden="true">
                  <path d="M3 3l18 18" />
                  <path d="M10.6 5.9A10.7 10.7 0 0 1 12 5.7c4.4 0 7.8 2.1 10 6.3a17 17 0 0 1-3.7 4.6" />
                  <path d="M6.5 6.5A17.1 17.1 0 0 0 2 12c2.2 4.2 5.6 6.3 10 6.3a10.8 10.8 0 0 0 5-1.2" />
                  <path d="M9.9 9.9a3.2 3.2 0 0 0 4.2 4.2" />
                </svg>
              </button>
            </div>
          </label>
          <button type="submit" class="primary auth-primary-button auth-split-submit">Reset Password</button>
        </form>

        <p id="reset-password-result" class="muted small auth-helper"></p>

        <div class="auth-split-footer-row">
          <a class="button-link ghost auth-secondary-button" href="/login">Back to Login</a>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/reset-password.js"></script>
</body>

</html>
