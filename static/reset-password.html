<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
  <button id="theme-toggle" class="theme-toggle theme-toggle-segmented" type="button" aria-label="Theme setting">
    <span class="theme-option" id="light-icon"><span class="theme-option-glyph">☀</span><span class="theme-option-label">Light</span></span>
    <span class="theme-option" id="dark-icon"><span class="theme-option-glyph">☾</span><span class="theme-option-label">Dark</span></span>
  </button>

  <main class="shell-main auth-split-shell-wrap">
    <section class="panel active auth-split-shell auth-split-shell-login">
      <div class="auth-split-card auth-split-form-card">
        <div class="auth-split-header">
          <p class="auth-split-kicker">Secure reset</p>
          <h1>Set new password</h1>
          <p class="muted">Use a strong password. This reset link works only once and expires automatically.</p>
        </div>

        <form id="reset-password-form" class="stack auth-form auth-split-form">
          <label>New Password
            <input type="password" name="new_password" autocomplete="new-password" minlength="8" required>
          </label>
          <label>Confirm New Password
            <input type="password" name="confirm_password" autocomplete="new-password" minlength="8" required>
          </label>
          <button type="submit" class="primary auth-primary-button auth-split-submit">Reset Password</button>
        </form>

        <p id="reset-password-result" class="muted small auth-helper"></p>

        <div class="auth-split-footer-row">
          <a class="button-link ghost auth-secondary-button" href="/login">Back to Login</a>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/reset-password.js"></script>
</body>

</html>
