<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League Ledger</title>
  <script>
    (function () {
      try {
        var token = localStorage.getItem("league-ledger-token");
        var raw = localStorage.getItem("league-ledger-workflow");
        var workflow = raw ? JSON.parse(raw) : {};
        var target = workflow && workflow.currentPage ? workflow.currentPage : "/setup";
        if (!token) {
          window.location.replace("/login");
          return;
        }
        window.location.replace(target);
      } catch (e) {
        window.location.replace("/setup");
      }
    })();
  </script>
</head>

<body></body>

</html>
