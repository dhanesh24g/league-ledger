<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League Ledger</title>
  <script>
    (function () {
      try {
        var token = localStorage.getItem("league-ledger-token");
        if (!token) {
          window.location.replace("/login");
          return;
        }
        window.location.replace("/welcome");
      } catch (e) {
        window.location.replace("/welcome");
      }
    })();
  </script>
</head>

<body></body>

</html>
