<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
  <button id="theme-toggle" class="theme-toggle theme-toggle-segmented" type="button" aria-label="Theme setting">
    <span class="theme-option" id="light-icon"><span class="theme-option-glyph">☀</span><span class="theme-option-label">Light</span></span>
    <span class="theme-option" id="dark-icon"><span class="theme-option-glyph">☾</span><span class="theme-option-label">Dark</span></span>
  </button>

  <main class="shell-main auth-split-shell-wrap">
    <section class="panel active auth-split-shell auth-split-shell-login">
      <div class="auth-split-card auth-split-form-card">
        <div class="auth-split-header">
          <p class="auth-split-kicker">Password recovery</p>
          <h1>Forgot your password?</h1>
          <p class="muted">Enter your username or email. If your account exists, you will get a secure reset link.</p>
        </div>

        <form id="forgot-password-form" class="stack auth-form auth-split-form">
          <label>Username Or Email
            <input name="identifier" placeholder="username or email" autocomplete="username" required>
          </label>
          <button type="submit" class="primary auth-primary-button auth-split-submit">Send Reset Link</button>
        </form>

        <div id="forgot-password-result" class="muted small auth-helper"></div>
        <div id="forgot-password-link" class="auth-reset-link-box hidden"></div>

        <div class="auth-split-footer-row">
          <a class="button-link ghost auth-secondary-button" href="/login">Back to Login</a>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/forgot-password.js"></script>
</body>

</html>
