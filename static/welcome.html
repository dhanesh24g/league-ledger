<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League Ledger Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <script>
    (function () {
      try {
        var token = localStorage.getItem("league-ledger-token");
        if (!token) {
          window.location.replace("/login");
          return;
        }
        var key = "dhaneshlabs-theme";
        var stored = localStorage.getItem(key);
        var theme = (stored === "light" || stored === "dark")
          ? stored
          : (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
    <span class="theme-icon" id="light-icon">☀️</span>
    <span class="theme-icon" id="dark-icon">🌙</span>
  </button>

  <header class="app-header">
    <div class="header-content">
      <div class="brand">
        <img src="/logo.png" alt="Dhanesh Labs logo" class="logo" />
        <div class="brand-text">
          <span class="brand-name">Dhanesh Labs</span>
          <span class="app-name">League Welcome</span>
        </div>
      </div>
      <div class="header-actions">
        <span id="auth-role" class="muted small"></span>
        <button id="logout-btn" type="button" class="ghost">Logout</button>
      </div>
    </div>
  </header>

  <main class="shell-main">
    <section class="panel active auth-panel">
      <h2 id="welcome-title">Loading your league access...</h2>
      <p id="welcome-copy" class="muted">Checking whether you should create the league or request to join it.</p>
      <div id="welcome-actions" class="stack"></div>
      <div id="join-requests-panel" class="stack hidden"></div>
    </section>
  </main>
  <script type="module" src="/static/welcome.js"></script>
</body>

</html>
